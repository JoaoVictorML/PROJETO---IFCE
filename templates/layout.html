<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Projeto IFCE{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/variables.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <div class="principal-container">
      {% include 'components/header.html' %}

      <div class="principal-content-container container-fluid mt-4">
        <div class="row">
          <!-- Conteúdo Principal -->
          <main class="col-md-9">{% block content %}{% endblock %}</main>

          <!-- Conteúdo Lateral - CORRIGIDO: de 'secondary' para 'secundary' -->
          <aside class="col-md-3">
            {% include 'components/secundary-content.html' %}
          </aside>
        </div>
      </div>

      {% include 'components/footer.html' %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
